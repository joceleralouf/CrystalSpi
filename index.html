svg#mm{position:fixed;inset:0;width:100%;height:100%}
#bg-overlay{position:fixed;inset:0;background:rgba(12,12,12,0.72);z-index:0;pointer-events:none}
.node-cat{cursor:pointer}
.node-cat circle{transition:r .25s,fill .25s,opacity .25s}
.node-cat text{pointer-events:none;font-family:'DM Sans',sans-serif;fill:#F5F0E8;text-anchor:middle;dominant-baseline:central}
.node-sub{cursor:pointer;transition:opacity .3s}
.node-sub circle{transition:r .2s,fill .2s}
.node-sub text{pointer-events:none;font-family:'DM Sans',sans-serif;fill:#F5F0E8;text-anchor:middle;dominant-baseline:central}
.edge{fill:none;transition:opacity .3s}

/* bottom sheet */
#sheet{
  position:fixed;bottom:-100%;left:0;right:0;height:55vh;
  background:rgba(14,14,14,0.94);border-top:1px solid #2a2a2a;border-radius:20px 20px 0 0;
  transition:bottom .38s cubic-bezier(.4,0,.2,1);z-index:20;
  display:flex;flex-direction:column;overflow:hidden
}
#sheet.open{bottom:0}
#sheet-head{
  padding:14px 18px 12px;border-bottom:1px solid #1e1e1e;
  display:flex;align-items:center;gap:10px;flex-shrink:0
}
#sheet-close{
  background:none;border:1px solid #333;border-radius:6px;
  color:#999;font-size:16px;cursor:pointer;
  margin-left:auto;padding:4px 10px;line-height:1;
  transition:all .15s;flex-shrink:0;
}
#sheet-close:hover,#sheet-close:active{background:#222;color:#F5F0E8;border-color:#555}
#sheet-cat{font-size:10px;color:#B8986A;letter-spacing:.12em;text-transform:uppercase}
#sheet-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;color:#F5F0E8;flex:1}
#bottle-grid{
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  touch-action:pan-y;
  padding:10px 14px 24px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;
  flex:1
}
.bottle-card{
  padding:12px 14px;border:1px solid #222;border-radius:8px;cursor:pointer;
  transition:background .15s,border-color .15s;display:flex;align-items:center;gap:10px;
  -webkit-tap-highlight-color:transparent;
}
.bottle-card:hover,.bottle-card:active{background:#1a1a1a;border-color:#333}
.b-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.b-name{font-size:13px;color:#E8E0D0;line-height:1.3}
.b-flag{font-size:10px;color:#B8986A;margin-left:auto;flex-shrink:0}

/* mobile nav */
#mobile-nav{
  display:none;position:fixed;
  top:0;left:0;right:0;bottom:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:60px 16px 24px;
  flex-direction:column;gap:6px;z-index:5;
}
.mob-row{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;border:1px solid #1e1e1e;border-radius:10px;
  background:#111;cursor:pointer;transition:background .15s;
  -webkit-tap-highlight-color:transparent;border-left-width:3px;
}
.mob-row:active{background:#1a1a1a}
.mob-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mob-info{flex:1;min-width:0}
.mob-name{font-size:14px;color:#E8E0D0;display:block}
.mob-sub{font-size:11px;color:#555;margin-top:2px;display:block}
.mob-arrow{color:#444;font-size:16px;flex-shrink:0}
.mob-back{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;margin-bottom:4px;cursor:pointer;
  color:#B8986A;font-size:13px;-webkit-tap-highlight-color:transparent;
}
.mob-section{font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:8px 16px 4px;color:#555;}
.mob-flag{font-size:10px;color:#B8986A;margin-left:6px;flex-shrink:0;}

@media(max-width:700px){
  #mm{display:none}
  #mobile-nav{display:flex}
  #sheet{height:72vh}
  #bottle-grid{grid-template-columns:1fr}
  #modal{
    inset:auto 0 0 0;top:auto;left:0;right:0;bottom:0;
    transform:none;max-width:100%;width:100%;
    max-height:88vh;border-radius:16px 16px 0 0;
  }
  .m-drag-handle{display:none}
  .m-body{padding:0 20px 32px}
  .m-grid{grid-template-columns:1fr}
  #hd{padding:14px 16px;flex-wrap:nowrap;}
  #btn-reset{font-size:11px;padding:4px 10px}
  #search-wrap{display:none}
}
@media(min-width:701px){
  #mob-search-wrap{display:none}
}
.bottle-card{
  padding:12px 14px;border:1px solid #222;border-radius:8px;cursor:pointer;
  transition:background .15s,border-color .15s;display:flex;align-items:center;gap:10px
}
.bottle-card:hover{background:#1a1a1a;border-color:#333}
.b-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.b-name{font-size:13px;color:#E8E0D0;line-height:1.3}
.b-flag{font-size:10px;color:#B8986A;margin-left:auto;flex-shrink:0}

/* modal */
#modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:30;display:none;
}
#modal-bg.open{display:block}
#modal{
  position:fixed;
  background:rgba(16,14,14,0.96);border:1px solid #2a2a2a;border-radius:14px;
  max-width:520px;width:calc(100% - 40px);
  max-height:80vh;
  overflow-y:auto;
  padding:0;
  top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:31;
  cursor:default;
  box-shadow:0 24px 60px rgba(0,0,0,.6);
}
#modal::-webkit-scrollbar{width:4px}
#modal::-webkit-scrollbar-track{background:transparent}
#modal::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.m-drag-handle{
  padding:14px 20px 0;display:flex;align-items:center;justify-content:space-between;
  cursor:grab;user-select:none;
}
.m-drag-handle:active{cursor:grabbing}
.m-drag-dots{display:flex;flex-direction:column;gap:3px;opacity:.3}
.m-drag-dots span{display:flex;gap:3px}
.m-drag-dots span i{width:3px;height:3px;border-radius:50%;background:#888;display:block}
.m-body{padding:0 28px 28px}
.m-close{
  background:none;border:none;
  color:#555;font-size:15px;cursor:pointer;width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;border-radius:50%;
  transition:color .15s,background .15s;flex-shrink:0;
}
.m-close:hover{color:#F5F0E8;background:#222}
.m-cat{font-size:10px;color:#B8986A;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.m-name{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:#F5F0E8;margin-bottom:2px}
.m-sub{font-size:12px;color:#555;margin-bottom:20px}
.m-desc{
  background:#0D0D0D;border-radius:8px;padding:14px 16px;margin-bottom:18px;
  font-size:13.5px;color:#A8A098;line-height:1.75
}
.m-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.m-field{border-left:2px solid #2a2a2a;padding-left:10px}
.m-field label{font-size:10px;color:#B8986A;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:3px}
.m-field p{font-size:13px;color:#C8C0B0;line-height:1.4}
.m-field.full{grid-column:1/-1}
.m-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.m-tag{font-size:11px;padding:3px 9px;border:1px solid #252525;border-radius:4px;color:#666}
.m-flag{margin-top:16px;padding-top:14px;border-top:1px solid #1e1e1e;font-size:12px;color:#B8986A}

/* header */
#hd{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;padding:16px 22px;
  background:linear-gradient(#0C0C0C 60%,transparent);pointer-events:none
}
#hd-logo{font-family:'Cormorant Garamond',serif;font-size:13px;color:#B8986A;letter-spacing:.18em;text-transform:uppercase;pointer-events:auto}
#bc{display:flex;align-items:center;gap:8px;margin-left:18px;opacity:0;transition:opacity .25s;pointer-events:none}
#bc.vis{opacity:1;pointer-events:auto}
.bc-sep{color:#333;font-size:12px}
.bc-a{font-size:12px;color:#555;cursor:pointer;transition:color .15s;pointer-events:auto}
.bc-a:hover{color:#B8986A}
.bc-cur{font-size:12px;color:#B8986A}
#btn-reset{
  margin-left:auto;background:none;border:1px solid #252525;border-radius:6px;
  padding:5px 12px;font-size:11px;color:#555;cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .2s;pointer-events:auto;opacity:0
}
#btn-reset.vis{opacity:1}
#btn-reset:hover{border-color:#B8986A;color:#B8986A}
#hint{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  font-size:11px;color:#333;letter-spacing:.15em;text-transform:uppercase;
  pointer-events:none;transition:opacity .3s;white-space:nowrap
}

/* Search bar */
#search-wrap{
  position:relative;display:flex;align-items:center;
  margin-left:16px;pointer-events:auto;
}
#search-input{
  background:#0F0F0F;border:1px solid #252525;border-radius:7px;
  color:#E8E0D0;font-family:'DM Sans',sans-serif;font-size:13px;
  padding:6px 32px 6px 34px;width:200px;
  transition:border-color .2s;
  outline:none;
}
#search-input::placeholder{color:#3a3a3a;}
#search-input:focus{border-color:#B8986A;}
#search-input:focus::placeholder{color:#555;}
.s-icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  color:#444;font-size:12px;pointer-events:none;
}

function resize(){W=window.innerWidth;H=window.innerHeight;cx=W/2;cy=H/2;}
resize();
window.addEventListener('resize',()=>{resize();render();});

// Create SVG element
function el(tag,attrs={}){
  const e=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const[k,v] of Object.entries(attrs))e.setAttribute(k,v);
  return e;
}

function catPos(i){
  const a=(i/DATA.length)*Math.PI*2-Math.PI/2;
  const R=Math.min(W,H)*0.3;
  return{x:cx+R*Math.cos(a),y:cy+R*Math.sin(a),a};
}

function subPos(ci,si,total,ca){
  const cpos=catPos(ci);
  const outA=Math.atan2(cpos.y-cy,cpos.x-cx);
  const spread=total>1?Math.PI*0.45:0;
  const step=total>1?spread/(total-1):0;
  const a=outA-spread/2+si*step;
  const R=Math.min(W,H)*0.17;
  return{x:cpos.x+R*Math.cos(a),y:cpos.y+R*Math.sin(a)};
}

function textLines(text,maxW,fontSize){
  const words=text.split(' ');
  const lines=[];let cur='';
  const approxCharW=fontSize*0.55;
  const maxChars=maxW/approxCharW;
  for(const w of words){
    if((cur+' '+w).trim().length>maxChars&&cur){lines.push(cur);cur=w;}
    else cur=(cur+' '+w).trim();
  }
  if(cur)lines.push(cur);
  return lines;
}

function addWrappedText(parent,text,x,y,maxW,fontSize,cls){
  const lines=textLines(text,maxW,fontSize);
  const lh=fontSize*1.25;
  const oy=-(lines.length-1)*lh/2;
  lines.forEach((l,i)=>{
    const t=el('text',{x,y:y+oy+i*lh,class:cls||'','font-size':fontSize});
    t.textContent=l;
    parent.appendChild(t);
  });
}

function render(){
  svg.innerHTML='';
  const isDark=true;
  const R=Math.min(W,H)*0.3;

  // Edges layer
  const edgeG=el('g');
  svg.appendChild(edgeG);

  // Center node
  const cg=el('g',{transform:`translate(${cx},${cy})`});
  const cc=el('circle',{r:52,fill:'#1A1A1A',stroke:'#B8986A','stroke-width':1.5});
  const ct1=el('text',{x:0,y:-10,'font-family':'Cormorant Garamond, serif','font-size':13,'fill':'#B8986A','text-anchor':'middle','dominant-baseline':'central','font-style':'italic'});
  ct1.textContent='Le Bar du Crystal';
  const ct2=el('text',{x:0,y:9,'font-family':'DM Sans, sans-serif','font-size':10,'fill':'#555','text-anchor':'middle','dominant-baseline':'central','letter-spacing':'0.1em'});
  ct2.textContent='SPIRITUEUX';
  cg.append(cc,ct1,ct2);
  svg.appendChild(cg);

  // Category nodes
  DATA.forEach((cat,ci)=>{
    const {x,y}=catPos(ci);
    const isActive=st.cat===ci;
    const isDimmed=st.cat!==null&&!isActive;
    
    // Edge center → cat
    const edge=el('line',{x1:cx,y1:cy,x2:x,y2:y,stroke:cat.color,'stroke-width':1,'stroke-dasharray':'3,4',opacity:isDimmed?0.08:isActive?0.7:0.3,class:'edge'});
    edgeG.appendChild(edge);

    const g=el('g',{class:'node-cat',transform:`translate(${x},${y})`,opacity:isDimmed?0.25:1});
    g.style.cursor='pointer';
    
    const r=isActive?40:34;
    const fill=isActive?cat.color:'#1A1A1A';
    const stroke=cat.color;
    const c=el('circle',{r,fill,stroke,'stroke-width':isActive?0:1.5,opacity:1});
    g.appendChild(c);
    
    const lines=textLines(cat.label,68,10);
    const lh=12.5;
    const oy=-(lines.length-1)*lh/2;
    lines.forEach((l,i)=>{
      const t=el('text',{x:0,y:oy+i*lh,'font-size':10.5,'font-weight':isActive?'500':'400',fill:isActive?'#FFF':'#D0C8B8','text-anchor':'middle','dominant-baseline':'central'});
      t.textContent=l;
      g.appendChild(t);
    });
    
    g.addEventListener('click',()=>selectCat(ci));
    svg.appendChild(g);

    // Sub-category nodes
    if(isActive){
      cat.subcats.forEach((sub,si)=>{
        const sp=subPos(ci,si,cat.subcats.length,catPos(ci).a);
        const isActiveSub=st.sub===si;
        
        // Edge cat → sub
        const se=el('line',{x1:x,y1:y,x2:sp.x,y2:sp.y,stroke:cat.color,'stroke-width':0.8,'stroke-dasharray':'2,3',opacity:0.4});
        edgeG.appendChild(se);
        
        const sg=el('g',{class:'node-sub',transform:`translate(${sp.x},${sp.y})`});
        sg.style.cursor='pointer';
        const sr=isActiveSub?29:24;
        const sc2=el('circle',{r:sr,fill:isActiveSub?cat.color:'#181818',stroke:cat.color,'stroke-width':isActiveSub?0:1,opacity:1});
        sg.appendChild(sc2);
        const subLines=textLines(sub.label,48,9);
        const slh=11;
        const soy=-(subLines.length-1)*slh/2;
        subLines.forEach((l,li)=>{
          const t=el('text',{x:0,y:soy+li*slh,'font-size':9,'font-weight':isActiveSub?'500':'400',fill:isActiveSub?'#FFF':'#B8B0A0','text-anchor':'middle','dominant-baseline':'central'});
          t.textContent=l;
          sg.appendChild(t);
        });
        sg.addEventListener('click',(e)=>{e.stopPropagation();selectSub(si);});
        svg.appendChild(sg);
      });
    }
  });
}

function selectCat(ci){
  if(st.cat===ci){st.cat=null;st.sub=null;closeSheet();}
  else{st.cat=ci;st.sub=null;closeSheet();}
  updateUI();render();buildMobileNav();
}

function resetSub(){st.sub=null;closeSheet();updateUI();render();buildMobileNav();}
function resetAll(){st.cat=null;st.sub=null;closeSheet();updateUI();render();buildMobileNav();}

function updateUI(){
  const hasC=st.cat!==null;
  const hasS=st.sub!==null;
  document.getElementById('bc').classList.toggle('vis',hasC);
  document.getElementById('btn-reset').classList.toggle('vis',hasC);
  document.getElementById('hint').style.opacity=hasC?'0':'1';
  if(hasC){
    const cat=DATA[st.cat];
    document.getElementById('bc-cat').textContent=cat.label;
    if(hasS){
      document.getElementById('bc-sep2').style.display='';
      document.getElementById('bc-sub').textContent=cat.subcats[st.sub].label;
    } else {
      document.getElementById('bc-sep2').style.display='none';
      document.getElementById('bc-sub').textContent='';
    }
  }
}

function openSheet(){
  const cat=DATA[st.cat];
  const sub=cat.subcats[st.sub];
  document.getElementById('sheet-cat').textContent=cat.label.toUpperCase();
  document.getElementById('sheet-title').textContent=sub.label+' — '+sub.sub;
  const grid=document.getElementById('bottle-grid');
  grid.innerHTML='';
  sub.bottles.forEach((b,bi)=>{
    const card=document.createElement('div');
    card.className='bottle-card';
    card.innerHTML=`<span class="b-dot" style="background:${cat.color}"></span><span class="b-name">${b.name}</span>${b.flag?'<span class="b-flag">⚠</span>':''}`;
    card.addEventListener('click',()=>openModal(bi));
    grid.appendChild(card);
  });
  document.getElementById('sheet').classList.add('open');
}

function closeSheet(){document.getElementById('sheet').classList.remove('open');}


const GLOSSARY = {
  "esters": "Molécules aromatiques produites lors de la fermentation. Responsables des arômes fruittés (banane, ananas, vernis) très caractéristiques des rhums jamaïcains. Plus un rhum est haut en esters, plus il est aromatique.",
  "mélasse": "Sous-produit visqueux de la fabrication du sucre de canne. Base de la majorité des rhums du monde (différent du rhum agricole fait de jus de canne fraîche). Donne des rhums plus ronds et sucrés.",
  "pot still": "Alambic à repasse (distillation discontinue). Produit des spiritueux plus riches en arômes que la distillation en colonne continue. Utilisé pour le cognac, le whisky irlandais, et les rhums jamaïcains premium.",
  "solera": "Système de vieillissement par fractionnement : les fûts les plus vieux alimentent progressivement les plus jeunes, sans jamais être complètement vidés. Crée un assemblage de différents âges. Utilisé au Xérès, Zacapa, Santa Teresa...",
  "single barrel": "Embouteillé depuis un seul fût sans assemblage. Chaque bouteille reflète les caractéristiques uniques d’un fût précis, ce qui explique les variations entre lots.",
  "bottled-in-bond": "Certification légale américaine de 1897. Critères stricts : single distillery, vieilli min. 4 ans dans un entrepôt fédéral, mis en bouteille à exactement 50% ABV.",
  "rancio": "Note de terroir unique développée dans les cognacs et armagnacs très vieux (20+ ans). Arôme complexe de champignon, truffe, noix vieille. Très recherché par les amateurs.",
  "phénol": "Composé chimique responsable des arômes tourbés dans les whiskies. Mesuré en ppm. Laphroaig ~45ppm = très tourbé. Octomore 14.2 = 138.7ppm = extrême.",
  "koji": "Champignon microscopique (Aspergillus) utilisé en Asie pour saccharifier les céréales sans maltage. Fondamental dans le saké, shochu, miso. Produit aussi des enzymes qui développent l’umami.",
  "mizunara": "Chêne japonais très rare (Quercus mongolica). Bois difficile à travailler mais donne des notes uniques : santal, noix de coco, encens. Chaque fût vaut plusieurs fois un fût de chêne européen.",
  "nixtamal": "Procédé mésoaméricain millénaire : cuisson du maïs dans une solution alcaline (eau de chaux). Libère des arômes spécifiques et augmente la valeur nutritive. Base de la tortilla et de certains spiritueux comme la liqueur Nixta.",
  "overproof": "Spiritueux dont le titre alcoométrique dépasse 57.15% (ou 50% selon les standards). Le terme vient de l’époque où on prouvait l’alcool en le mélangeant à de la poudre à canon.",
  "passerillage": "Séchage des raisins au soleil avant fermentation pour concentrer les sucres. Technique du Pedro Ximénez. Donne des xérès très sucrés et concentrés.",
  "flor": "Voile naturel de levures qui se forme à la surface des vins de Jerez. Protège le vin de l’oxydation et lui donne ses notes caractéristiques d’amande et de pain (style Fino et Manzanilla).",
  "kasu": "Lie de saké — résidu solide après pressage. Très aromatique (notes d’ananas, fruitté ginjo). Utilisé en cuisine japonaise et comme base pour certains spiritueux innovants.",
  "capsaïcine": "Molécule responsable de la brûlure du piment. Lie aux récepteurs TRPV1, produisant une sensation de chaleur intense. Soluble dans l’alcool.",
  "ppm": "Parties par million. En whisky, mesure les composés phénoliques (fumée de tourbe) dans le malt. Plus le chiffre est élevé, plus le whisky sera tourbé. Octomore 14.2 : 138.7ppm.",
  "brut de fût": "Mis en bouteille directement depuis le fût, sans dilution. Le titre est celui naturel de la barrique (souvent 55-70%). Intensité maximale. Aussi appelé cask strength.",
  "awamori": "Spiritueux traditionnel d’Okinawa, Japon. Distinct du shochu continental. Distillé de riz indica avec du koji noir unique à Okinawa. Vieilli en poteries d’argile (kuusu).",
  "double aging": "Vieillissement en deux étapes dans deux types de fûts. Ex : Plantation XO vieillit d’abord en Caraïbes puis en fûts de cognac en France.",
  "nixtamalisé": "Issu du procédé nixtamal : cuisson à l’eau de chaux. Libère les arômes du maïs et augmente sa valeur nutritive.",
  "wash": "Moût fermenté prêt à être distillé (avant la distillation). Titre alcooolmétrique généralement entre 7 et 10%.",
  "mash bill": "Récipe de céréales utilisées pour un bourbon ou un whisky américain. La proportion de maïs, seigle, froment et orge définit le style.",
  "grain": "Céréale autre que l’orge malté (blé, maïs, seigle) utilisée en distillation continue. Le whisky de grain est plus léger que le single malt."
};

function applyGlossary(text) {
  const terms = Object.keys(GLOSSARY);
  terms.sort((a,b) => b.length - a.length);
  let result = text;
  terms.forEach(term => {
    const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp('\\b(' + escaped + ')\\b', 'gi');
    result = result.replace(re, (match) => {
      const def = GLOSSARY[term].replace(/"/g, '&quot;');
      return '<span class="gterm" data-def="' + def + '">' + match + '</span>';
    });
  });
  return result;
}

function openModal(bi){
  const cat=DATA[st.cat];
  const sub=cat.subcats[st.sub];
  const b=sub.bottles[bi];
  document.getElementById('m-cat').textContent=cat.label+' · '+sub.label;
  document.getElementById('m-name').textContent=b.name;
  document.getElementById('m-sub').textContent=sub.sub;
  document.getElementById('m-desc').innerHTML=applyGlossary(b.desc);
  const grid=document.getElementById('m-grid');
  grid.innerHTML='';
  Object.entries(b.fields).forEach(([k,v])=>{
    const d=document.createElement('div');
    d.className='m-field';
    d.innerHTML=`<label>${k}</label><p>${v}</p>`;
    grid.appendChild(d);
  });
  const tags=document.getElementById('m-tags');
  tags.innerHTML=(b.tags||[]).map(t=>`<span class="m-tag">${t}</span>`).join('');
  const flag=document.getElementById('m-flag');
  if(b.flag){flag.textContent='⚠ '+b.flag;flag.style.display='';}
  else flag.style.display='none';
  document.getElementById('modal-bg').classList.add('open');
  // Reset position to center
  const m=document.getElementById('modal');
  m.style.transform='translate(-50%,-50%)';
  m.style.left='50%';m.style.top='50%';
}

function closeModal(){document.getElementById('modal-bg').classList.remove('open');}
function handleModalBg(e){if(e.target===document.getElementById('modal-bg'))closeModal();}

// Drag modal
(function(){
  const modal=document.getElementById('modal');
  const handle=document.getElementById('m-handle');
  let drag=false,ox=0,oy=0,mx=0,my=0;
  handle.addEventListener('mousedown',(e)=>{
    drag=true;
    const r=modal.getBoundingClientRect();
    // Switch from transform centering to fixed position
    modal.style.transform='none';
    modal.style.left=r.left+'px';
    modal.style.top=r.top+'px';
    ox=e.clientX-r.left;oy=e.clientY-r.top;
    e.preventDefault();
  });
  document.addEventListener('mousemove',(e)=>{
    if(!drag)return;
    let nx=e.clientX-ox,ny=e.clientY-oy;
    nx=Math.max(0,Math.min(nx,window.innerWidth-modal.offsetWidth));
    ny=Math.max(0,Math.min(ny,window.innerHeight-modal.offsetHeight));
    modal.style.left=nx+'px';modal.style.top=ny+'px';
  });
  document.addEventListener('mouseup',()=>{drag=false;});
})();

// Mobile nav
function isMobile(){return window.innerWidth<=700}
function buildMobileNav(){
  const nav=document.getElementById('mobile-nav');
  nav.innerHTML='';
  if(!isMobile())return;
  nav.scrollTop=0;

  // Mobile search bar (always visible)
  const sw=document.createElement('div');
  sw.id='mob-search-wrap';
  sw.innerHTML='<input id="mob-search-input" type="text" placeholder="Rechercher un spiritueux…" autocomplete="off" />';
  nav.appendChild(sw);
  const mobInp=sw.querySelector('#mob-search-input');
  mobInp.value=searchQuery||'';
  mobInp.addEventListener('input',function(){handleSearch(this.value);});

  // If search active, show results inline
  if(searchQuery && searchQuery.length>=2){
    const results=searchBottles(searchQuery);
    const countDiv=document.createElement('div');
    countDiv.className='mob-search-count';
    countDiv.textContent=results.length+' résultat'+(results.length!==1?'s':'');
    nav.appendChild(countDiv);
    if(results.length===0){
      const empty=document.createElement('div');
      empty.className='mob-search-empty';
      empty.textContent='Aucun résultat pour « '+searchQuery+' »';
      nav.appendChild(empty);
    } else {
      results.forEach(({b,bi,ci,si,cat})=>{
        const d=document.createElement('div');
        d.className='mob-result-row';
        d.style.borderLeftColor=cat.color;
        d.innerHTML='<span class="mob-dot" style="background:'+cat.color+'"></span><div class="mob-info"><span class="mob-name">'+b.name+'</span><span class="mob-sub">'+cat.label+' · '+cat.subcats[si].label+'</span></div><span class="mob-arrow">›</span>';
        d.addEventListener('click',()=>{st.cat=ci;st.sub=si;openModal(bi);});
        nav.appendChild(d);
      });
    }
    return;
  }

  if(st.cat===null){
    // Niveau 1 : catégories
    DATA.forEach((cat,ci)=>{
      const total=cat.subcats.reduce((a,s)=>a+s.bottles.length,0);
      const d=document.createElement('div');
      d.className='mob-row';d.style.borderLeftColor=cat.color;
      d.innerHTML=`<span class="mob-dot" style="background:${cat.color}"></span><div class="mob-info"><span class="mob-name">${cat.label}</span><span class="mob-sub">${total} bouteilles</span></div><span class="mob-arrow">›</span>`;
      d.addEventListener('click',()=>{st.cat=ci;st.sub=null;updateUI();buildMobileNav();});
      nav.appendChild(d);
    });

  } else if(st.sub===null){
    // Niveau 2 : sous-catégories
    const cat=DATA[st.cat];
    const back=document.createElement('div');
    back.className='mob-back';
    back.innerHTML=`← Retour`;back.style.color=cat.color;
    back.addEventListener('click',()=>{st.cat=null;st.sub=null;updateUI();buildMobileNav();});
    nav.appendChild(back);
    const title=document.createElement('div');
    title.className='mob-section';title.textContent=cat.label;title.style.color=cat.color;
    nav.appendChild(title);
    cat.subcats.forEach((sub,si)=>{
      const d=document.createElement('div');
      d.className='mob-row';d.style.borderLeftColor=cat.color;
      d.innerHTML=`<div class="mob-info"><span class="mob-name">${sub.label}</span><span class="mob-sub">${sub.sub} · ${sub.bottles.length} bouteilles</span></div><span class="mob-arrow">›</span>`;
      d.addEventListener('click',()=>{st.sub=si;updateUI();buildMobileNav();});
      nav.appendChild(d);
    });

  } else {
    // Niveau 3 : bouteilles
    const cat=DATA[st.cat];
    const sub=cat.subcats[st.sub];
    const back=document.createElement('div');
    back.className='mob-back';
    back.innerHTML=`← ${sub.label}`;back.style.color=cat.color;
    back.addEventListener('click',()=>{st.sub=null;updateUI();buildMobileNav();});
    nav.appendChild(back);
    const title=document.createElement('div');
    title.className='mob-section';title.textContent=sub.label+' — '+sub.sub;title.style.color=cat.color;
    nav.appendChild(title);
    sub.bottles.forEach((b,bi)=>{
      const d=document.createElement('div');
      d.className='mob-row mob-bottle';d.style.borderLeftColor=cat.color;
      d.innerHTML=`<span class="mob-dot" style="background:${cat.color}"></span><div class="mob-info"><span class="mob-name">${b.name}</span>${b.flag?'<span class="mob-flag">⚠</span>':''}</div><span class="mob-arrow">›</span>`;
      d.addEventListener('click',()=>openModal(bi));
      nav.appendChild(d);
    });
  }
}

function selectSub(si){
  st.sub=si;
  if(!isMobile())openSheet();
  updateUI();
  render();
  buildMobileNav();
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
let searchQuery = '';

function getAllBottles() {
  const results = [];
  DATA.forEach((cat, ci) => {
    cat.subcats.forEach((sub, si) => {
      sub.bottles.forEach((b, bi) => {
        results.push({ b, bi, si, ci, cat, sub });
      });
    });
  });
  return results;
}

function searchBottles(query) {
  if (!query || query.trim().length < 2) return [];
  const q = query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  return getAllBottles().filter(({ b, cat, sub }) => {
    const name = b.name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const catLabel = cat.label.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const subLabel = sub.label.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const tags = (b.tags || []).join(' ').toLowerCase();
    const desc = (b.desc||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    return name.includes(q) || catLabel.includes(q) || subLabel.includes(q) || tags.includes(q) || desc.includes(q);
  });
}

function handleSearch(val) {
  searchQuery = val.trim();
  const clearBtn = document.getElementById('search-clear');
  if (clearBtn) clearBtn.style.display = searchQuery ? 'block' : 'none';

  if (searchQuery.length >= 2) {
    const results = searchBottles(searchQuery);
    showSearchResults(results, searchQuery);
  } else {
    closeSheet();
  }

  // Mobile
  buildMobileNav();
}

function clearSearch() {
  const inp = document.getElementById('search-input');
  if (inp) inp.value = '';
  searchQuery = '';
  const clearBtn = document.getElementById('search-clear');
  if (clearBtn) clearBtn.style.display = 'none';
  closeSheet();
  buildMobileNav();
}

function showSearchResults(results, query) {
  const sheet = document.getElementById('sheet');
  const catEl = document.getElementById('sheet-cat');
  const titleEl = document.getElementById('sheet-title');
  const grid = document.getElementById('bottle-grid');
  grid.innerHTML = '';

  catEl.textContent = 'RECHERCHE';
  titleEl.textContent = results.length === 0
    ? 'Aucun résultat pour « ' + query + ' »'
    : results.length + ' résultat' + (results.length > 1 ? 's' : '') + ' pour « ' + query + ' »';

  if (results.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'padding:24px;color:#444;font-size:13px;text-align:center;';
    empty.textContent = 'Essayez avec un autre terme…';
    grid.appendChild(empty);
  } else {
    results.forEach(({ b, bi, ci, si, cat }) => {
      // Temporarily set state so openModal works
      const card = document.createElement('div');
      card.className = 'bottle-card';
      card.innerHTML =
        '<span class="b-dot" style="background:' + cat.color + ';flex-shrink:0"></span>' +
        '<span class="b-name">' + b.name + '</span>' +
        '<span class="b-cat-badge" style="background:' + cat.color + '">' + cat.label + '</span>';
      card.addEventListener('click', () => {
        // Set state and open modal
        st.cat = ci; st.sub = si;
        openModal(bi);
      });
      grid.appendChild(card);
    });
  }

  sheet.classList.add('open');
}

// ─── END SEARCH ──────────────────────────────────────────────────────────────

render();
buildMobileNav();
window.addEventListener('resize',()=>{render();buildMobileNav();});
